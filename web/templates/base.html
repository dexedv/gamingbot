<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pink Horizoon Bot{% endblock %} — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% block head %}{% endblock %}
  <style>
    :root {
      --bg:        #08090f;
      --sidebar:   #0c0d16;
      --card:      #0f1119;
      --border:    #1b1f2e;
      --accent:    #5865f2;
      --accent2:   #7289da;
      --glow:      rgba(88,101,242,.18);
      --text:      #dde2ea;
      --muted:     #8892a4;
      --faint:     #2e3447;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --sidebar-w: 230px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: .9rem;
      margin: 0;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    #sidebar {
      position: fixed; inset: 0 auto 0 0;
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 200;
    }

    .sb-brand {
      padding: 1.5rem 1.25rem 1.2rem;
      font-size: 1.1rem; font-weight: 700; color: #fff;
      letter-spacing: -.01em;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .55rem;
    }
    .sb-brand .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg,#5865f2,#7289da);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .sb-brand span { color: var(--accent2); }

    .sb-section {
      padding: .5rem .75rem .25rem;
      font-size: .68rem; font-weight: 600; letter-spacing: .08em;
      color: var(--faint); text-transform: uppercase;
      margin-top: .5rem;
    }

    .sb-nav { padding: .5rem .75rem; flex: 1; }

    .sb-link {
      display: flex; align-items: center; gap: .65rem;
      padding: .6rem .85rem; border-radius: 9px;
      color: var(--muted); text-decoration: none;
      font-size: .875rem; font-weight: 500;
      transition: background .14s, color .14s, box-shadow .14s;
      margin-bottom: 2px;
      position: relative;
    }
    .sb-link i { font-size: 1rem; width: 18px; text-align: center; flex-shrink: 0; }
    .sb-link:hover { background: var(--border); color: var(--text); }
    .sb-link.active {
      background: var(--glow);
      color: #fff;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .sb-link.active i { color: var(--accent); }

    .sb-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: .78rem; color: var(--muted);
    }
    .sb-footer .status {
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: .5rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink:0; }
    .sb-footer a {
      color: var(--faint); text-decoration: none; font-size: .78rem;
      display: flex; align-items: center; gap: .4rem;
      transition: color .14s;
    }
    .sb-footer a:hover { color: var(--muted); }

    /* ── Main ──────────────────────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      padding: 2rem 2.25rem;
      min-height: 100vh;
    }

    .page-header {
      margin-bottom: 1.75rem;
    }
    .page-header h1 {
      font-size: 1.45rem; font-weight: 700; color: #fff; margin: 0;
    }
    .page-header p {
      color: var(--muted); margin: .2rem 0 0; font-size: .85rem;
    }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .card-header {
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: .9rem 1.25rem;
      font-weight: 600; color: #c8d0dc;
      font-size: .9rem;
    }

    /* Stat Cards */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      position: relative; overflow: hidden;
      transition: border-color .2s, transform .15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-accent, var(--accent));
      border-radius: 14px 14px 0 0;
    }
    .stat-card .s-icon {
      position: absolute; right: 1.2rem; top: 50%;
      transform: translateY(-50%);
      font-size: 2.2rem; opacity: .07;
    }
    .stat-card .s-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted); margin-bottom: .3rem;
    }
    .stat-card .s-value {
      font-size: 1.85rem; font-weight: 700; color: #fff;
      line-height: 1.1;
    }
    .stat-card .s-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

    /* ── Tables ─────────────────────────────────────────────────────────── */
    .table { color: var(--text); }
    .table thead th {
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .06em; font-weight: 600;
      padding: .75rem 1rem;
    }
    .table tbody td { padding: .8rem 1rem; border-color: var(--border); vertical-align: middle; }
    .table tbody tr { border-color: var(--border); }
    .table tbody tr:hover { background: rgba(255,255,255,.025); }
    .table-striped > tbody > tr:nth-of-type(odd) > * { background: rgba(255,255,255,.012); }

    /* Rank badges */
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%;
      font-size: .75rem; font-weight: 700; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg,#ffd700,#ffb300); color:#000; }
    .rank-2 { background: linear-gradient(135deg,#d1d5db,#9ca3af); color:#000; }
    .rank-3 { background: linear-gradient(135deg,#cd7f32,#a0522d); color:#fff; }
    .rank-n { background: var(--border); color: var(--muted); }

    /* ── Progress ────────────────────────────────────────────────────────── */
    .progress { background: var(--border); border-radius: 99px; height: 5px; }
    .progress-bar { border-radius: 99px; background: var(--accent); }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge-accent { background: rgba(88,101,242,.2); color: var(--accent2); border: 1px solid rgba(88,101,242,.3); }

    /* ── Forms ───────────────────────────────────────────────────────────── */
    .form-control, .form-select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 9px;
    }
    .form-control:focus, .form-select:focus {
      background: var(--bg); border-color: var(--accent);
      color: #fff; box-shadow: 0 0 0 3px var(--glow);
    }
    .form-control::placeholder { color: var(--faint); }
    .btn-accent {
      background: var(--accent); color: #fff; border: none;
      border-radius: 9px; font-weight: 500;
      transition: background .15s;
    }
    .btn-accent:hover { background: #4752c4; color: #fff; }

    /* ── Nav Pills ────────────────────────────────────────────────────────── */
    .nav-pills .nav-link {
      color: var(--muted); border-radius: 9px;
      font-size: .85rem; padding: .5rem 1rem;
      transition: all .15s;
    }
    .nav-pills .nav-link:hover { color: var(--text); background: var(--border); }
    .nav-pills .nav-link.active { background: var(--accent); color: #fff; }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Avatar initials ─────────────────────────────────────────────────── */
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; flex-shrink: 0;
    }

    /* ── Misc ────────────────────────────────────────────────────────────── */
    .text-accent { color: var(--accent2); }
    .search-box { max-width: 300px; }

    /* Toggle switch */
    .form-switch .form-check-input { width: 2.5em; height: 1.3em; cursor: pointer; }
    .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
    .form-check-input:focus { box-shadow: 0 0 0 3px var(--glow); border-color: var(--accent); }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav id="sidebar">
  <div class="sb-brand">
    <div class="logo-icon">🎮</div>
    <div>Gaming<span>Bot</span></div>
  </div>

  <div class="sb-nav">
    <div class="sb-section">Navigation</div>
    <a class="sb-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
      <i class="bi bi-grid-1x2"></i> Dashboard
    </a>
    <a class="sb-link {% if request.endpoint == 'leaderboards' %}active{% endif %}" href="/leaderboards">
      <i class="bi bi-trophy"></i> Ranglisten
    </a>
    <a class="sb-link {% if request.endpoint == 'statistiken' %}active{% endif %}" href="/statistiken">
      <i class="bi bi-bar-chart-line"></i> Statistiken
    </a>
    <a class="sb-link {% if request.endpoint == 'users' %}active{% endif %}" href="/users">
      <i class="bi bi-people"></i> Nutzer
    </a>

    <a class="sb-link {% if request.endpoint == 'umfragen' %}active{% endif %}" href="/umfragen">
      <i class="bi bi-ui-checks"></i> Umfragen
    </a>

    <div class="sb-section" style="margin-top:1rem">Verwaltung</div>
    <a class="sb-link {% if request.endpoint == 'willkommen' %}active{% endif %}" href="/willkommen">
      <i class="bi bi-door-open"></i> Willkommen
    </a>
    <a class="sb-link {% if request.endpoint == 'broadcast' %}active{% endif %}" href="/broadcast">
      <i class="bi bi-send"></i> Nachrichten
    </a>
<a class="sb-link {% if request.endpoint == 'templates' %}active{% endif %}" href="/templates">
      <i class="bi bi-archive"></i> Templates
    </a>
    <a class="sb-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
      <i class="bi bi-sliders"></i> Einstellungen
    </a>
  </div>

  <div class="sb-footer">
    <div class="status">
      <span class="dot"></span>
      <span>Bot online</span>
    </div>
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Abmelden</a>
  </div>
</nav>

<!-- ── Content ── -->
<main id="main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
