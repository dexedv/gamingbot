<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GamingBot{% endblock %} — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-width: 240px;
      --accent: #5865F2;
      --accent-glow: rgba(88,101,242,0.3);
    }
    body { background: #0d0f13; color: #c8cdd4; font-family: 'Segoe UI', sans-serif; }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed; top: 0; left: 0; height: 100vh;
      width: var(--sidebar-width);
      background: #12151a;
      border-right: 1px solid #1e2229;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 1.4rem 1.2rem 1rem;
      font-size: 1.15rem; font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #1e2229;
    }
    .sidebar-brand span { color: var(--accent); }
    .nav-link {
      color: #8b949e; border-radius: 8px;
      margin: 2px 10px; padding: 9px 14px;
      font-size: .9rem; display: flex; align-items: center; gap: 10px;
      transition: all .15s;
    }
    .nav-link:hover  { color: #fff; background: #1e2229; }
    .nav-link.active { color: #fff; background: var(--accent); }
    .nav-link i { font-size: 1.1rem; }
    .sidebar-footer {
      margin-top: auto; padding: 1rem 1.2rem;
      border-top: 1px solid #1e2229;
      font-size: .78rem; color: #555;
    }

    /* ── Main ── */
    #main { margin-left: var(--sidebar-width); padding: 2rem; min-height: 100vh; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
    .page-title small { font-size: .9rem; color: #555; font-weight: 400; }

    /* ── Cards ── */
    .card {
      background: #12151a; border: 1px solid #1e2229;
      border-radius: 12px;
    }
    .card-header {
      background: transparent; border-bottom: 1px solid #1e2229;
      font-weight: 600; color: #dde1e7; padding: .85rem 1.2rem;
    }
    .stat-card {
      background: #12151a; border: 1px solid #1e2229;
      border-radius: 12px; padding: 1.2rem 1.4rem;
      position: relative; overflow: hidden;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card .icon {
      font-size: 2rem; opacity: .15;
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
    }
    .stat-card .label { font-size: .78rem; color: #555; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .stat-card .sub   { font-size: .8rem; color: #6c757d; margin-top: .2rem; }

    /* ── Tables ── */
    .table { color: #c8cdd4; }
    .table thead th {
      border-bottom: 1px solid #1e2229; color: #555;
      font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
    }
    .table tbody tr { border-color: #1a1e24; }
    .table tbody tr:hover { background: #191d24; }
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: .8rem; font-weight: 700;
    }
    .rank-1 { background: #ffd700; color: #000; }
    .rank-2 { background: #c0c0c0; color: #000; }
    .rank-3 { background: #cd7f32; color: #000; }
    .rank-n { background: #1e2229; color: #8b949e; }

    /* ── Progress bars ── */
    .progress { background: #1e2229; border-radius: 4px; height: 6px; }
    .progress-bar { background: var(--accent); border-radius: 4px; }

    /* ── Badges ── */
    .badge-accent { background: var(--accent); }

    /* ── Form controls ── */
    .form-control, .form-select {
      background: #0d0f13; border: 1px solid #2a2f38;
      color: #c8cdd4; border-radius: 8px;
    }
    .form-control:focus, .form-select:focus {
      background: #0d0f13; border-color: var(--accent);
      color: #fff; box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn-accent { background: var(--accent); color: #fff; border: none; border-radius: 8px; }
    .btn-accent:hover { background: #4752c4; color: #fff; }

    /* ── Misc ── */
    .dot-online { width: 8px; height: 8px; background: #23d160; border-radius: 50%; display: inline-block; }
    .search-box { max-width: 320px; }

    /* Sidebar Cog Rows */
    .sidebar-cog-row { transition: background .15s; }
    .sidebar-cog-row:hover { background: #1a1e24 !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0f13; }
    ::-webkit-scrollbar-thumb { background: #2a2f38; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-brand">
    🎮 <span>Gaming</span>Bot
  </div>

  <!-- Nav Links -->
  <ul class="nav flex-column pt-2">
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'leaderboards' %}active{% endif %}" href="/leaderboards">
        <i class="bi bi-trophy"></i> Leaderboards
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'users' %}active{% endif %}" href="/users">
        <i class="bi bi-people"></i> Nutzer
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
        <i class="bi bi-gear"></i> Einstellungen
      </a>
    </li>
  </ul>

  <!-- Module Section -->
  <div style="padding: 0 10px; margin-top: 8px;">
    <button class="w-100 d-flex align-items-center justify-content-between px-3 py-2 rounded-2"
      style="background:none; border:none; color:#555; font-size:.78rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600; cursor:pointer;"
      data-bs-toggle="collapse" data-bs-target="#moduleCollapse">
      <span><i class="bi bi-puzzle me-2"></i>Module</span>
      <i class="bi bi-chevron-down" id="moduleChevron" style="transition:.2s; font-size:.75rem"></i>
    </button>
  </div>
  <div class="collapse show" id="moduleCollapse">
    <div id="sidebarCogList" style="padding: 2px 10px 8px;">
      <!-- Wird per JS befüllt -->
    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <span class="dot-online me-1"></span> Bot läuft
    <span id="sidebarCogStatus" class="float-end" style="font-size:.75rem; color:#444"></span>
  </div>
</nav>

<!-- Main content -->
<main id="main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

<script>
// Chevron drehen beim Collapse
document.getElementById('moduleCollapse').addEventListener('show.bs.collapse', () => {
  document.getElementById('moduleChevron').style.transform = 'rotate(0deg)';
});
document.getElementById('moduleCollapse').addEventListener('hide.bs.collapse', () => {
  document.getElementById('moduleChevron').style.transform = 'rotate(-90deg)';
});

// Cogs in Sidebar laden
async function loadSidebarCogs() {
  try {
    const res  = await fetch('/api/cogs');
    const cogs = await res.json();
    const list = document.getElementById('sidebarCogList');
    const active = cogs.filter(c => c.loaded).length;
    document.getElementById('sidebarCogStatus').textContent = `${active}/${cogs.length}`;

    list.innerHTML = cogs.map(cog => `
      <div class="d-flex align-items-center justify-content-between px-2 py-1 rounded-2 sidebar-cog-row"
           style="cursor:default; border-radius:6px;" id="scog-${cog.name.replace('.','_')}">
        <span style="font-size:.82rem; color:${cog.loaded ? '#c8cdd4' : '#555'}">
          ${cog.icon} ${cog.label}
        </span>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input sidebar-cog-toggle" type="checkbox"
            style="width:2em; height:1.1em; cursor:pointer; margin:0"
            data-cog="${cog.name}"
            ${cog.loaded ? 'checked' : ''}>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.sidebar-cog-toggle').forEach(toggle => {
      toggle.addEventListener('change', async function() {
        const cogName = this.dataset.cog;
        this.disabled = true;
        try {
          const res  = await fetch(`/api/cogs/${cogName}/toggle`, { method: 'POST' });
          const data = await res.json();
          if (data.error) {
            alert('Fehler: ' + data.error);
            this.checked = !this.checked;
          } else {
            const row = document.querySelector(`#scog-${cogName.replace('.','_')} span`);
            if (row) row.style.color = data.loaded ? '#c8cdd4' : '#555';
            // Status aktualisieren
            const total  = document.querySelectorAll('.sidebar-cog-toggle').length;
            const active = document.querySelectorAll('.sidebar-cog-toggle:checked').length;
            document.getElementById('sidebarCogStatus').textContent = `${active}/${total}`;
            // Auch Settings-Seite aktualisieren falls offen
            if (typeof loadCogs === 'function') loadCogs();
          }
        } catch(e) {
          this.checked = !this.checked;
        }
        this.disabled = false;
      });
    });
  } catch(e) { /* Bot noch nicht bereit */ }
}

loadSidebarCogs();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
