<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Pink Horizoon Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #08090f; --card: #0f1119; --border: #1b1f2e;
      --accent: #5865f2; --glow: rgba(88,101,242,.18);
      --text: #dde2ea; --muted: #8892a4; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .login-wrap {
      width: 100%; max-width: 380px; padding: 1rem;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: .65rem; margin-bottom: .4rem;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg,#5865f2,#7289da);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .logo-text {
      font-size: 1.3rem; font-weight: 700; color: #fff;
    }
    .logo-text span { color: var(--accent); }
    .subtitle {
      text-align: center; color: var(--muted);
      font-size: .82rem; margin-bottom: 2rem;
    }

    .field-label {
      display: block; font-size: .78rem; color: var(--muted);
      margin-bottom: .4rem; font-weight: 500;
    }

    .field-wrap { position: relative; margin-bottom: 1.25rem; }
    .field-wrap i {
      position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: .95rem; pointer-events: none;
    }
    .field-wrap input {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 9px;
      padding: .65rem 1rem .65rem 2.5rem;
      font-size: .9rem; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    input::placeholder { color: #3a4254; }

    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
      border-radius: 9px; padding: .65rem 1rem;
      color: #f87171; font-size: .85rem;
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: 1.25rem;
    }

    .btn-login {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 9px; padding: .75rem 1rem;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-login:hover { background: #4752c4; }
    .btn-login:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">🎮</div>
        <div class="logo-text">Gaming<span>Bot</span></div>
      </div>
      <p class="subtitle">Anmeldung erforderlich</p>

      {% if error %}
      <div class="error-box">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST">
        <label class="field-label" for="un">Benutzername</label>
        <div class="field-wrap">
          <i class="bi bi-person"></i>
          <input type="text" id="un" name="username"
            placeholder="admin" autofocus autocomplete="username">
        </div>

        <label class="field-label" for="pw">Passwort</label>
        <div class="field-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="pw" name="password"
            placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">
          Anmelden <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
