<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — GamingBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --accent: #5865F2; --accent-glow: rgba(88,101,242,0.3); }
    body {
      background: #0d0f13; color: #c8cdd4;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #12151a;
      border: 1px solid #1e2229;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
    }
    .login-logo {
      font-size: 2.2rem; font-weight: 700;
      color: #fff; text-align: center;
      margin-bottom: .25rem;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      text-align: center; color: #555;
      font-size: .85rem; margin-bottom: 2rem;
    }
    .form-control {
      background: #0d0f13; border: 1px solid #2a2f38;
      color: #c8cdd4; border-radius: 8px; padding: .65rem 1rem;
    }
    .form-control:focus {
      background: #0d0f13; border-color: var(--accent);
      color: #fff; box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn-login {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; width: 100%; padding: .7rem;
      font-weight: 600; font-size: .95rem;
      transition: background .15s;
    }
    .btn-login:hover { background: #4752c4; color: #fff; }
    .error-box {
      background: rgba(220,53,69,.12);
      border: 1px solid rgba(220,53,69,.3);
      border-radius: 8px; padding: .65rem 1rem;
      color: #e06c75; font-size: .88rem;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: .5rem;
    }
    label { color: #8b949e; font-size: .85rem; margin-bottom: .35rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🎮 <span>Gaming</span>Bot</div>
    <div class="login-sub">Dashboard — Anmeldung erforderlich</div>

    {% if error %}
    <div class="error-box">
      <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password"
               class="form-control" placeholder="••••••••"
               autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
